name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  backend-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          working-directory: backend
          version: latest
      - name: Security scan
        run: |
          cd backend
          go install github.com/securego/gosec/v2/cmd/gosec@latest
          gosec ./...
      - name: Vulnerability check
        run: |
          cd backend
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

  backend-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test
        ports:
          - 5432:5432
        options: --health-cmd="pg_isready -U test" --health-interval=5s --health-timeout=5s --health-retries=5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: --health-cmd="redis-cli ping" --health-interval=5s --health-timeout=5s --health-retries=5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - name: Run tests
        run: |
          cd backend
          go test -v -race -coverprofile=coverage.out ./...
        env:
          DATABASE_URL: postgres://test:test@localhost:5432/test?sslmode=disable
          REDIS_URL: localhost:6379
          JWT_SECRET: test-secret-key-for-ci-minimum-32chars
      - name: Build
        run: cd backend && go build -o bin/server cmd/server/main.go

  frontend-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - name: Install and check
        run: |
          cd frontend
          bun install
          bun run check
      - name: Build
        run: cd frontend && bun run build

  python-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          cd python-service
          pip install -r requirements.txt
          pip install pytest
      - name: Run tests
        run: cd python-service && python -m pytest tests/ -v --tb=short || true

  docker-build:
    runs-on: ubuntu-latest
    needs: [backend-lint, backend-test, frontend-check, python-test]
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker images
        run: docker compose build
