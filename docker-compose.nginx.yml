version: '3.8'

# Alternative docker-compose with Nginx instead of Caddy
# Use: docker compose -f docker-compose.nginx.yml up -d

services:
  postgres:
    image: postgres:15-alpine
    container_name: jobapplier-postgres
    environment:
      POSTGRES_USER: ${DB_USER:-jobapplier}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME:-jobapplier}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/migrations/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-jobapplier}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - app-network

  backend:
    build:
      context: ./backend
      dockerfile: ../Dockerfile.backend
    container_name: jobapplier-backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://${DB_USER:-jobapplier}:${DB_PASSWORD}@postgres:5432/${DB_NAME:-jobapplier}?sslmode=disable
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRY: 24h
      PYTHON_SERVICE_URL: http://python-service:8001
      SERVER_PORT: 8080
      GIN_MODE: release
    restart: unless-stopped
    networks:
      - app-network

  python-service:
    build:
      context: ./python-service
      dockerfile: ../Dockerfile.python-service
    container_name: jobapplier-python
    volumes:
      - data_folder:/app/data_folder
    environment:
      LLM_API_KEY: ${LLM_API_KEY}
      LLM_MODEL: ${LLM_MODEL:-gpt-4o-mini}
    restart: unless-stopped
    networks:
      - app-network

  frontend:
    build:
      context: ./frontend
      dockerfile: ../Dockerfile.frontend
      args:
        PUBLIC_API_URL: /api
    container_name: jobapplier-frontend
    depends_on:
      - backend
    environment:
      PUBLIC_API_URL: /api
    restart: unless-stopped
    networks:
      - app-network

  nginx:
    image: nginx:alpine
    container_name: jobapplier-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      - backend
      - frontend
    restart: unless-stopped
    networks:
      - app-network

volumes:
  postgres_data:
  data_folder:
  nginx_logs:

networks:
  app-network:
    driver: bridge
    name: jobapplier-network
