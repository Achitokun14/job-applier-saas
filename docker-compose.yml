version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: jobapplier
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
      POSTGRES_DB: jobapplier
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/migrations:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jobapplier"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: ../Dockerfile.backend
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://jobapplier:${DB_PASSWORD:-changeme}@postgres:5432/jobapplier?sslmode=disable
      JWT_SECRET: ${JWT_SECRET:-your-secret-key}
      JWT_EXPIRY: 24h
      PYTHON_SERVICE_URL: http://python-service:8001
      REDIS_URL: redis:6379
      GIN_MODE: release

  python-service:
    build:
      context: ./python-service
      dockerfile: ../Dockerfile.python-service
    ports:
      - "8001:8001"
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./data_folder:/app/data_folder
    environment:
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_MODEL: ${LLM_MODEL:-gpt-4o-mini}

  celery-worker:
    build:
      context: ./python-service
      dockerfile: ../Dockerfile.python-service
    command: celery -A src.celery_app worker --loglevel=info --concurrency=4
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./data_folder:/app/data_folder
    environment:
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_MODEL: ${LLM_MODEL:-gpt-4o-mini}

  flower:
    build:
      context: ./python-service
      dockerfile: ../Dockerfile.python-service
    command: celery -A src.celery_app flower --port=5555
    ports:
      - "5555:5555"
    depends_on:
      redis:
        condition: service_healthy
    environment:
      LLM_API_KEY: ${LLM_API_KEY:-}

  frontend:
    build:
      context: ./frontend
      dockerfile: ../Dockerfile.frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      PUBLIC_API_URL: http://localhost:8080

  scraper:
    build:
      context: ./scraper
      dockerfile: Dockerfile
    ports:
      - "8081:8081"
    volumes:
      - ./scraper/data:/app/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  asynqmon:
    image: hibiken/asynqmon:latest
    ports:
      - "8082:8080"
    environment:
      REDIS_ADDR: redis:6379
    depends_on:
      redis:
        condition: service_healthy

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - backend
      - frontend
      - scraper

volumes:
  postgres_data:
  redis_data:
  caddy_data:
  caddy_config:
  scraper_data:
  prometheus_data:
  grafana_data:
